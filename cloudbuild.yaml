# Cloud Build configuration for deploying to Cloud Run
# Usage: gcloud builds submit --config cloudbuild.yaml .
# Or trigger automatically via Cloud Build triggers connected to your repo.

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carbon-footprint-platform:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carbon-footprint-platform:latest'
      - '.'

  # Step 2: Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/carbon-footprint-platform:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/carbon-footprint-platform:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'carbon-footprint-platform'
      - '--image'
      - 'gcr.io/$PROJECT_ID/carbon-footprint-platform:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'NODE_ENV=production'

substitutions:
  _REGION: 'asia-south1'

images:
  - 'gcr.io/$PROJECT_ID/carbon-footprint-platform:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/carbon-footprint-platform:latest'

options:
  logging: CLOUD_LOGGING_ONLY
